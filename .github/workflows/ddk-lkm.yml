name: Build KernelSU Kernel Module

on:
  workflow_call:
    inputs:
      kmi:
        description: 'KMI version'
        required: true
        type: string
      ddk_release:
        description: 'DDK release version'
        required: false
        default: '20260313'
        type: string

jobs:
  build-kernelsu-ko:
    name: Build kernelsu.ko for ${{ inputs.kmi }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ylarod/ddk-min:${{ inputs.kmi }}-${{ inputs.ddk_release }}
      options: --privileged

    steps:
    - name: Checkout source code
      uses: actions/checkout@v6

# --- 专属暗杀者注入补丁 ---
    - name: Inject Oplus Guard Sniper Patch
      run: |
        cat << 'EOF' > patch_ksu.py
        import os

        target_file = "kernel/ksu.c"
        if not os.path.exists(target_file):
            print(f"❌ Error: {target_file} not found!")
            exit(1)

        with open(target_file, "r") as f:
            content = f.read()

        injector_funcs = """
        #include <linux/notifier.h>
        static int guard_tripwire_callback(struct notifier_block *nb, unsigned long action, void *data) {
            struct module *mod = data;
            if (action == MODULE_STATE_COMING && mod) {
                if (strcmp(mod->name, "oplus_secure_guard_new") == 0) {
                    pr_alert("KernelSU Sniper: Tripwire triggered! Blocking %s natively.\\n", mod->name);
                    return notifier_from_errno(-EPERM);
                }
            }
            return NOTIFY_DONE;
        }
        static struct notifier_block guard_tripwire_nb = { .notifier_call = guard_tripwire_callback, .priority = INT_MAX };
        static void clean_preexisting_guard(void) {
            char *envp[] = { "HOME=/", "TERM=linux", "PATH=/sbin:/system/sbin:/system/bin:/vendor/bin", NULL };
            char *argv[] = { "/system/bin/rmmod", "oplus_secure_guard_new", NULL };
            call_usermodehelper(argv[0], argv, envp, UMH_WAIT_PROC);
        }

        int __init kernelsu_init(void)
        """

        injector_calls = """    register_module_notifier(&guard_tripwire_nb);
            clean_preexisting_guard();
            pr_info("Initialized on:"""

        if "guard_tripwire_callback" not in content:
            content = content.replace("int __init kernelsu_init(void)", injector_funcs)
            content = content.replace('pr_info("Initialized on:', injector_calls)
            with open(target_file, "w") as f:
                f.write(content)
            print("✅ Oplus Sniper patch applied successfully!")
        else:
            print("⚠️ Patch already applied, skipping.")
        EOF
        python3 patch_ksu.py
    # --- 注入补丁结束 ---

    - name: Build kernelsu.ko
      run: |
        git config --global --add safe.directory /__w/ReSukiSU/ReSukiSU
        cd kernel

        echo "=== Building kernelsu.ko for KMI: ${{ inputs.kmi }} ==="
        CONFIG_KSU=m CONFIG_KSU_MULTI_MANAGER_SUPPORT=y CC=clang make
        
        echo "=== Build completed ==="
        # Create output directory in GitHub workspace
        mkdir -p /github/workspace/out
        # Copy with KMI-specific naming
        OUTPUT_NAME="${{ inputs.kmi }}_kernelsu.ko"
        cp kernelsu.ko "/github/workspace/out/$OUTPUT_NAME"
        
        echo "Copied to: /github/workspace/out/$OUTPUT_NAME"
        ls -la "/github/workspace/out/$OUTPUT_NAME"
        echo "Size: $(du -h "/github/workspace/out/$OUTPUT_NAME" | cut -f1)"
        llvm-strip -d "/github/workspace/out/$OUTPUT_NAME"
        echo "Size after stripping: $(du -h "/github/workspace/out/$OUTPUT_NAME" | cut -f1)"
        
    - name: Upload kernelsu.ko artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.kmi }}-lkm
        path: /github/workspace/out/${{ inputs.kmi }}_kernelsu.ko
